[[ceramic_coating]]
question = "What ceramic coating products do you use?"
answer = "I use premium products from Gtechniq and Gyeon — including Gtechniq Crystal Serum Light, Exo V4, and Halo Flexible Film coating for PPF, as well as Gyeon Q2 Syncro EVO. These are industry-leading products trusted by professional detailers worldwide."

[[ceramic_coating]]
question = "What is ceramic coating and how does it work?"
answer = "Ceramic coating is a liquid polymer that chemically bonds to your vehicle's paintwork, forming a hard, semi-permanent layer of protection. It repels water, contaminants, and UV damage while giving your paint a deep, glossy finish that is far more durable than traditional wax or sealant."

[[ceramic_coating]]
question = "Is ceramic coating worth it for a new car?"
answer = "Absolutely. A new car's paintwork is at its best the moment it leaves the factory, and protecting it immediately locks that condition in. Ceramic coating shields against UV fading, bird droppings, road grime, and light scratches — keeping your paint looking showroom-fresh for years to come."

[[ceramic_coating]]
question = "What is the difference between Crystal Serum Light and Exo V4?"
answer = "Crystal Serum Light is Gtechniq's flagship paint coating — a hard, chemically resistant layer that bonds directly to the paintwork. Exo V4 is a hydrophobic top coat designed to be layered over a base coating, enhancing water-beading and self-cleaning properties. Used together they provide exceptional protection and gloss."

[[ceramic_coating]]
question = "Do I need paint correction before ceramic coating?"
answer = "In most cases, yes. Ceramic coating permanently locks in the condition of your paintwork, so any swirl marks, scratches, or oxidation should be addressed first with a machine polish. I can assess your paintwork and advise whether correction is needed before coating."

[[ceramic_coating]]
question = "Can ceramic coating be applied over PPF?"
answer = "Yes. Gtechniq Halo Flexible Film coating is specifically designed for application over paint protection film (PPF), adding hydrophobic properties and gloss enhancement to the film surface."

[[ceramic_coating]]
question = "How do I maintain a ceramic coating after application?"
answer = "A coated car is significantly easier to maintain than an uncoated one. Regular maintenance washes using a pH-neutral shampoo are all that is needed to keep the coating performing at its best. Avoid harsh chemicals or abrasive wash equipment that could degrade the coating over time."

[[paint_correction]]
question = "What is paint correction and do I need it?"
answer = "Paint correction is the process of removing surface defects from your car's paintwork — including swirl marks, fine scratches, water spots, and oxidation — using a machine polisher. If your paint looks dull, hazy, or covered in fine scratches under direct light, paint correction will restore its depth and clarity."

[[paint_correction]]
question = "Can you remove swirl marks from dark or black paint?"
answer = "Yes. Swirl marks are particularly visible on dark and black paint and are one of the most common reasons customers book a machine polish. Starting from £160, machine polishing removes swirl marks and restores a deep, clear finish."

[[paint_correction]]
question = "What is the difference between a machine polish and a hand polish?"
answer = "Machine polishing uses a dual-action or rotary polisher to cut back the clear coat and remove deeper defects such as swirl marks and light scratches. Hand polishing and waxing is suitable for paint that is already in good condition and simply needs refreshing and protecting."

[[prestige_new_cars]]
question = "I have just bought a new car — what do you recommend?"
answer = "For a brand new car, I would recommend a thorough decontamination and machine polish to remove any handling marks or dealer-applied products, followed by a ceramic coating to protect the factory paintwork. This is the best way to maintain the value and appearance of a new vehicle from day one."

[[prestige_new_cars]]
question = "Is mobile valeting and detailing safe for prestige and luxury vehicles?"
answer = "Yes. I take great care with all vehicles and use premium products suited to high-end paintwork, leather, and trim. Whether it is a Range Rover, BMW, Mercedes, or classic car, your vehicle will be treated with the attention it deserves."

[[prestige_new_cars]]
question = "Why is protecting my car's paintwork important?"
answer = "Your car's paintwork is one of the biggest contributors to its value and kerb appeal. Without protection, paint is vulnerable to UV fading, bird dropping etching, road contaminants, and swirl marks from washing. A quality coating or wax applied from new is far cheaper than a respray later."

[[general]]
question = "What areas do you cover?"
answer = "I cover Scarborough and surrounding areas across North Yorkshire, including Filey, Whitby, Pickering, Malton, and Bridlington. A £45 travel charge applies outside of Scarborough."

[[general]]
question = "How long does a full valet or detail take?"
answer = "A full valet typically takes 3–5 hours depending on the size and condition of the vehicle. Machine polishing and ceramic coating take longer and will be discussed at the time of booking."

[[general]]
question = "What happens if it rains on the day?"
answer = "Light rain is usually manageable if there is some cover available. If heavy rain is forecast, I will reschedule your appointment at no extra charge."

[[general]]
question = "Do I need to provide water or electricity?"
answer = "Yes, access to an outside tap and a standard plug socket is needed so I can run my equipment."
